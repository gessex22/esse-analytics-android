name: CI

# El wrapper de Gradle (gradle/wrapper/gradle-wrapper.jar) no está commiteado
# a propósito (ver README) — por eso este workflow instala Gradle directo con
# gradle/actions/setup-gradle en vez de invocar ./gradlew. Cuando el wrapper
# jar exista en el repo, cambiar los pasos de "gradle ..." a "./gradlew ...".

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Lint
        run: gradle lint --stacktrace

      - name: Assemble debug
        run: gradle assembleDebug --stacktrace

      - name: Subir reporte de lint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: "**/build/reports/lint-results-*.html"
          if-no-files-found: ignore
